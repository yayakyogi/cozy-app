<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="mobileui/style.css" />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" type="text/css" href="css/index.css" />
    <link rel="icon" href="./icons/ic_logo.png" type="image/icon type" />
    <title>Home</title>
  </head>
  <body class="home white">
    <div style="padding: 24px">
      <h1 class="title-home">Explore Now</h1>
      <span style="font-size: 16px; color: #82868e"
        >Mencari kosan yang cozy</span
      >
      <h1 class="subtitle-home" style="margin-top: 30px; font-weight: 500">
        Recommended Space
      </h1>
      <div style="margin-top: 16px">
        <!-- Recomended Space 1 -->
        <div
          class="row vertical-align-center"
          style="margin-bottom: 30px"
          onclick="routes('detail')"
        >
          <!-- Image -->
          <div
            style="
              position: relative;
              border-radius: 10px;
              width: 130px;
              height: 110px;
              overflow: hidden;
            "
          >
            <img src="./img/img-popular-1.png" width="130" height="110" />
            <!-- Rating -->
            <div
              class="row"
              style="
                position: absolute;
                background-color: #5843be;
                padding: 2px 10px;
                top: 0;
                right: 0;
                border-bottom-left-radius: 30px;
              "
            >
              <img src="./icons/ic_star.png" width="18" height="18" />
              <span style="color: white; font-size: 13px">4/5</span>
            </div>
            <!-- ./Rating -->
          </div>
          <!-- ./Image -->

          <!-- Information -->
          <div style="flex: 1; margin-left: 20px">
            <h1 style="font-size: 18px; color: #000000; font-weight: 300">
              Kuretakeso Hott
            </h1>
            <span style="font-size: 16px; color: #5843be; font-weight: 600"
              >$52
            </span>
            <span style="font-size: 16px; color: #7a7e86; font-weight: 100"
              >/ month</span
            >
            <p style="margin-top: 16px; color: #82868e; font-weight: 100">
              Bandung, Germany
            </p>
          </div>
          <!-- ./Information -->
        </div>
        <!-- ./Recomended Space 1 -->

        <!-- Recomended Space 2 -->
        <div
          class="row vertical-align-center"
          style="margin-bottom: 10px"
          onclick="routes('detail')"
        >
          <!-- Image -->
          <div
            style="
              position: relative;
              border-radius: 10px;
              width: 130px;
              height: 110px;
              overflow: hidden;
            "
          >
            <img src="./img/img-popular-2.png" width="130" height="110" />
            <!-- Rating -->
            <div
              class="row"
              style="
                position: absolute;
                background-color: #5843be;
                padding: 2px 10px;
                top: 0;
                right: 0;
                border-bottom-left-radius: 30px;
              "
            >
              <img src="./icons/ic_star.png" width="18" height="18" />
              <span style="color: white; font-size: 13px">5/5</span>
            </div>
            <!-- ./Rating -->
          </div>
          <!-- ./Image -->

          <!-- Information -->
          <div style="flex: 1; margin-left: 20px">
            <h1 style="font-size: 18px; color: #000000; font-weight: 300">
              Roemah Nenek
            </h1>
            <span style="font-size: 16px; color: #5843be; font-weight: 600"
              >$11
            </span>
            <span style="font-size: 16px; color: #7a7e86; font-weight: 100"
              >/ month</span
            >
            <p style="margin-top: 16px; color: #82868e; font-weight: 100">
              Seattle, Bogor
            </p>
          </div>
          <!-- ./Information -->
        </div>
        <!-- ./Recomended Space 2 -->

        <!-- Line -->
        <div class="row-between vertical-align-center">
          <div
            style="width: 200px; height: 2px; background-color: #e9e9e9"
          ></div>
          <button style="padding: 0; color: #5843be; font-size: 13px">
            Lihat lebih banyak
          </button>
        </div>
        <!-- ./Line -->

        <h1
          class="subtitle-home"
          style="margin-top: 10px; margin-bottom: 16px; font-weight: 500"
        >
          Tips & Guidance
        </h1>
        <!-- Tips & Guidenace 1 -->
        <div class="row vertical-align-center" style="margin-bottom: 30px">
          <!-- Image -->
          <div
            style="
              position: relative;
              border-radius: 10px;
              width: 80;
              height: 80px;
              overflow: hidden;
            "
          >
            <img src="./icons/ic_guidlines.png" width="80" height="80" />
          </div>
          <!-- ./Image -->

          <!-- Information -->
          <div style="flex: 1; margin-left: 20px">
            <h1 style="font-size: 18px; color: #000000; font-weight: 300">
              City Guidelines
            </h1>
            <p style="margin-top: 4px; color: #82868e; font-weight: 100">
              Jakarta, Indonesia
            </p>
          </div>
          <!-- ./Information -->
          <img src="./icons/ic_right_outline.png" width="24" height="24" />
        </div>
        <!-- ./Tips & Guidance 1 -->

        <!-- Tips & Guidenace 2 -->
        <div class="row vertical-align-center" style="margin-bottom: 30px">
          <!-- Image -->
          <div
            style="
              position: relative;
              border-radius: 10px;
              width: 80;
              height: 80px;
              overflow: hidden;
            "
          >
            <img src="./icons/ic_jakarta_fairship.png" width="80" height="80" />
          </div>
          <!-- ./Image -->

          <!-- Information -->
          <div style="flex: 1; margin-left: 20px">
            <h1 style="font-size: 18px; color: #000000; font-weight: 300">
              Jakarta Fairship
            </h1>
            <p style="margin-top: 4px; color: #82868e; font-weight: 100">
              Updated 11 Dec
            </p>
          </div>
          <!-- ./Information -->
          <img src="./icons/ic_right_outline.png" width="24" height="24" />
        </div>
        <!-- ./Tips & Guidance -->
      </div>
    </div>
    <!-- Bottom Navigator -->
    <div style="width: 100%; padding: 0 20px; position: absolute; bottom: 20px">
      <div
        style="
          background-color: #f6f7f8;
          width: 100%;
          display: flex;
          justify-content: space-around;
          align-items: center;
          padding-top: 15px;
          border-radius: 23px;
          box-sizing: border-box;
        "
      >
        <button class="active">
          <img src="./icons/ic_home_on.png" width="28" height="32" />
        </button>
        <button>
          <img src="./icons/ic_mail_off.png" width="28" height="32" />
        </button>
        <button>
          <img src="./icons/ic_card_off.png" width="28" height="32" />
        </button>
        <button>
          <img src="./icons/ic_love_off.png" width="28" height="32" />
        </button>
      </div>
    </div>
    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="mobileui/mobileui.js"></script>
    <script type="text/javascript" src="js/fileku.js"></script>
    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
