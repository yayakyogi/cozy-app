<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="mobileui/style.css" />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" type="text/css" href="css/index.css" />
    <link rel="icon" href="./icons/ic_logo.png" type="image/icon type" />
    <title>Register</title>
  </head>
  <body class="list home grey-100">
    <div style="padding: 50px 5px">
      <h1
        style="
          font-size: 32px;
          color: #000000;
          text-align: center;
          margin-bottom: 50px;
        "
      >
        Buat Akun
      </h1>
      <div class="row-center">
        <img
          src="./img/img-register.svg"
          width="250"
          style="margin-bottom: 30px"
        />
      </div>
      <div class="list" style="border: none">
        <div class="item label-float">
          <label>Username</label>
          <input type="text" style="color: #000000" />
        </div>
        <div class="item label-float">
          <label>Email</label>
          <input type="email" style="color: #000000" />
        </div>
        <div class="item label-float">
          <label>Password</label>
          <input type="password" style="color: #000000" />
        </div>
        <div class="item">
          <button
            class="full"
            style="
              margin-top: 30px;
              background-color: #5843be;
              color: #ffffff;
              border-radius: 10px;
              padding: 5px 0;
            "
            onclick="routes('home')"
          >
            Daftar
          </button>
          <div
            style="
              display: flex;
              justify-content: center;
              align-items: center;
              margin-top: 10px;
            "
          >
            <p style="font-size: 12px; color: #82868e">Sudah punya akun?</p>
            <button
              style="
                font-size: 12px;
                color: #5843be;
                padding: 0;
                margin-left: 5px;
              "
              onclick="routes('login')"
            >
              Login
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="js/jquery.min.js"></script>
    <script type="text/javascript" src="mobileui/mobileui.js"></script>
    <script type="text/javascript" src="js/fileku.js"></script>
    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
